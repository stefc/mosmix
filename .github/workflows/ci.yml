name: CI

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Deploy and Bump Version
        if: github.ref == 'refs/heads/main'
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          # Configure Git Bot
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Get the current version to release
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "Releasing version: $VERSION"
          
          # Deploy / Publish to crates.io
          cargo publish --token "$CRATES_IO_TOKEN"
          
          # Tag the release and push it
          git tag "v$VERSION"
          git push origin "v$VERSION"          
          
          # Read bumped version
          NEW_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          
          # Update Cargo.lock
          cargo check
          
          # Commit the bumped version back to main
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin HEAD:main